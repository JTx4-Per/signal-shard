<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240" role="img" aria-label="Obsidian SignalShard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0014"/>
      <stop offset="60%" stop-color="#140826"/>
      <stop offset="100%" stop-color="#1f0b38"/>
    </linearGradient>
    <linearGradient id="shard" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="45%" stop-color="#b388ff"/>
      <stop offset="100%" stop-color="#6a3ae0"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#d9b8ff"/>
      <stop offset="100%" stop-color="#b388ff"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#7c4dff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#b388ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c4dff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="240" fill="url(#bg)"/>

  <!-- subtle flow lines: implied processing direction -->
  <g opacity="0.35">
    <line x1="0"   y1="120" x2="900" y2="120" stroke="url(#flow)" stroke-width="1"/>
    <line x1="0"   y1="60"  x2="900" y2="60"  stroke="url(#flow)" stroke-width="0.5" opacity="0.5"/>
    <line x1="0"   y1="185" x2="900" y2="185" stroke="url(#flow)" stroke-width="0.5" opacity="0.5"/>
  </g>
  <g fill="#b388ff" opacity="0.25">
    <circle cx="220" cy="60"  r="1.2"/>
    <circle cx="420" cy="60"  r="1.2"/>
    <circle cx="640" cy="60"  r="1.2"/>
    <circle cx="260" cy="185" r="1.2"/>
    <circle cx="500" cy="185" r="1.2"/>
    <circle cx="740" cy="185" r="1.2"/>
  </g>

  <!-- shard emblem -->
  <g transform="translate(95,120)" filter="url(#glow)">
    <polygon points="0,-66 52,-18 38,58 -38,58 -52,-18" fill="url(#shard)" stroke="#e9d5ff" stroke-width="1.25"/>
    <polygon points="0,-66 0,58 -38,58 -52,-18" fill="#6a3ae0" opacity="0.55"/>
    <polyline points="-28,-8 -8,12 8,-4 26,22" fill="none" stroke="#ffffff" stroke-width="1.3" opacity="0.85"/>
  </g>

  <!-- wordmark block: tight vertical rhythm -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace">
    <!-- kicker: anchored above title, left-aligned -->
    <text x="185" y="88" font-size="12" fill="#b388ff" letter-spacing="6" opacity="0.85">OBSIDIAN</text>

    <!-- dominant wordmark -->
    <text x="183" y="145" font-size="60" font-weight="700" fill="url(#wordmark)" letter-spacing="1.5">SignalShard</text>

    <!-- tagline: brighter, tighter tracking, heavier -->
    <text x="186" y="175" font-size="14" font-weight="600" fill="#f3e8ff" letter-spacing="1.5">conversation state as the source of truth</text>

    <!-- system traits: intentional footer, aligned under title -->
    <text x="186" y="202" font-size="11" fill="#b388ff" letter-spacing="2" opacity="0.95">
      reducer  •  state machine  •  writeback
    </text>
    <text x="186" y="220" font-size="10" fill="#7c4dff" letter-spacing="2" opacity="0.75">
      deterministic  •  auditable  •  no LLM required
    </text>
  </g>
</svg>
